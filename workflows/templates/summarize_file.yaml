name: summarize_file
version: 2
description: Read a file the user attached in chat, summarize it via LLM, save the result.
chat_examples:
  - "summarize the attached file"
  - "summarize this for me"
  - "analyze the attached file"
inputs:
  file_path: "/tmp/example.txt"
  provider: "anthropic"
  out_dir: "/tmp"
steps:
  - id: read
    type: read_file
    config:
      path: ${inputs.file_path}

  - id: summarize
    type: llm
    config:
      provider: ${inputs.provider}
      system: "You are a concise summarizer."
      prompt: |
        Summarize the following document in 5 bullets.

        Source: ${inputs.file_path}

        Content:
        ${steps.read.output.content}

  - id: save
    type: write_file
    destructive: true
    requires_confirmation: true
    config:
      path: ${inputs.out_dir}/hollerbox-summary-${run.id}.md
      content: ${steps.summarize.output.text}
