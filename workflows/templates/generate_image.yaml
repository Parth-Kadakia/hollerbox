name: generate_image
version: 2
description: Generate an image from a text prompt and save it to disk.
chat_examples:
  - "draw a sunset over the ocean"
  - "make an image of a cat astronaut"
  - "generate an image"
inputs:
  prompt: "a children's book illustration of a fox reading a book"
  provider: "openai"
  out_dir: "/tmp"
steps:
  - id: render
    type: image
    destructive: true
    requires_confirmation: true
    config:
      provider: ${inputs.provider}
      prompt: ${inputs.prompt}
      size: "1024x1024"
      # Unique per run so chats don't collide and the browser doesn't
      # cache a stale copy. ${run.id} is the 32-char hex run id.
      save_to: ${inputs.out_dir}/hollerbox-${run.id}.png
