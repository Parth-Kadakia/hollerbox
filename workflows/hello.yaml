# The smoke-test workflow. `hollerbox run workflows/hello.yaml`.
#
# Run with:    hollerbox run workflows/hello.yaml
# Override:    hollerbox run workflows/hello.yaml --input who=you
name: hello
version: 1
description: Smoke test — greets you and reports the moment it ran.
chat_examples:
  - "say hi"
  - "run hello"
inputs:
  who: "world"
steps:
  - id: greet
    type: shell
    config:
      command: "echo 'Hello, ${inputs.who}! — HollerBox'"

  - id: stamp
    type: python_step
    config:
      code: |
        # Demonstrates step-output passing: `greet`'s stdout is available here.
        import datetime as dt
        output = {
          "greeting": steps["greet"]["output"]["stdout"].strip(),
          "ran_at": dt.datetime.now(dt.timezone.utc).isoformat(timespec="seconds"),
        }
