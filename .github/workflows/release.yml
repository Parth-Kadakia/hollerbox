name: Release

# Cuts a HollerBox.app release whenever a tag like `v0.0.2` is pushed.
# The bundled launcher's auto-updater polls /releases/latest, so any
# pushed tag here becomes the "you can update now" target for every
# user already running an older build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.2)"
        required: true

permissions:
  contents: write   # required to upload assets to a release

jobs:
  build-mac:
    name: Build HollerBox.app (macOS arm64)
    # macos-14 = arm64 Apple Silicon runners. Builds here only work on
    # arm64 Macs. Intel users currently need to build from source.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        run: |
          cd web
          npm ci
          npm run build

      - name: Sync app deps + build .app
        run: |
          cd app
          uv sync --extra build
          uv run pyinstaller HollerBox.spec --clean --noconfirm

      - name: Ad-hoc sign + strip quarantine
        run: |
          codesign --force --deep --sign - app/dist/HollerBox.app
          xattr -cr app/dist/HollerBox.app

      - name: Package as HollerBox.zip
        run: |
          cd app/dist
          # `ditto` preserves macOS metadata + symlinks better than
          # `zip -r` for .app bundles.
          ditto -c -k --keepParent HollerBox.app HollerBox.zip
          shasum -a 256 HollerBox.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Use the pushed tag, OR the manually-supplied input.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: app/dist/HollerBox.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
